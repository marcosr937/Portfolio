  :root {
    --bg: #080808;
    --surface: #111111;
    --surface-hover: #181818;
    --border: #1f1f1f;
    --border-hover: #2e2e2e;
    --text-primary: #F0F0ED;
    --text-secondary: #888880;
    --text-muted: #444440;
    --accent: #E2FF00;
    --accent-dim: rgba(226,255,0,0.08);
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    line-height: 1.6;

  }

  }

    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: -0.02em;
    color: var(--text-primary);
    text-decoration: none;
  }

  .nav-back {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 13px;
    color: var(--text-secondary);
    text-decoration: none;
    transition: color 0.2s;
  }

  .nav-back:hover { color: var(--accent); }
  .nav-back:hover svg { transform: translateX(-3px); }
  .nav-back svg { transition: transform 0.2s; }

  /* HERO */
  .project-hero {
    padding: 120px 3rem 80px;
    border-bottom: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }

  .hero-grid-bg {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 80px 80px;
    opacity: 0.2;
    pointer-events: none;
  }

  .hero-inner {
    max-width: 900px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  .hero-chips {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-bottom: 2rem;
  }

  .chip {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-secondary);
    border: 1px solid var(--border-hover);
    padding: 5px 12px;
    border-radius: 2px;
  }

  .chip.accent {
    color: var(--accent);
    border-color: rgba(226,255,0,0.3);
  }

  .project-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(36px, 5.5vw, 72px);
    font-weight: 700;
    letter-spacing: -0.04em;
    line-height: 0.95;
    margin-bottom: 1.5rem;
    color: #fff;
  }

  .project-title span { color: var(--accent); }

  .project-subtitle {
    font-size: 17px;
    color: var(--text-secondary);
    line-height: 1.7;
    max-width: 620px;
    margin-bottom: 3rem;
  }

  .meta-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2rem;
    padding-top: 2rem;
    border-top: 1px solid var(--border);
  }

  .meta-label {
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 0.4rem;
  }

  .meta-value {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.5;
  }

  /* HERO VISUAL */
  .hero-visual {
    margin-top: 3.5rem;
    border: 1px solid var(--border-hover);
    border-radius: 4px;
    height: 360px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .hero-visual-icon {
    font-size: 6rem;
    opacity: 0.15;
    position: relative;
    z-index: 1;
  }

  .hero-visual-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(226,255,0,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(226,255,0,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  /* CONTENT */
  .content {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 3rem;
  }

  .section {
    padding: 4rem 0;
    border-bottom: 1px solid var(--border);
  }

  .section:last-of-type { border-bottom: none; }

  .section-label {
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .section-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(24px, 3vw, 36px);
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1.05;
    margin-bottom: 1.5rem;
  }

  .section-title em { font-style: normal; color: var(--accent); }

  .body-text {
    font-size: 15px;
    color: var(--text-secondary);
    line-height: 1.8;
    margin-bottom: 1.25rem;
  }

  .body-text strong { color: var(--text-primary); font-weight: 500; }

  .pull-quote {
    border-left: 3px solid var(--accent);
    padding: 1.25rem 1.75rem;
    margin: 2rem 0;
    background: var(--accent-dim);
    border-radius: 0 4px 4px 0;
  }

  .pull-quote p {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 17px;
    font-weight: 500;
    line-height: 1.55;
    color: var(--text-primary);
    letter-spacing: -0.01em;
  }

  .cards-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    margin: 2rem 0;
  }

  .info-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1.5rem;
  }

  .info-card-label {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.5rem;
  }

  .info-card-text {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.6;
  }

  .styled-list {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    margin: 1.5rem 0;
  }

  .styled-list li {
    display: flex;
    gap: 0.75rem;
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.6;
    list-style: none;
  }

  .styled-list li::before {
    content: '—';
    color: var(--accent);
    flex-shrink: 0;
  }

  /* TABLE */
  .cs-table {
    width: 100%;
    border-collapse: collapse;
    margin: 1.5rem 0;
    font-size: 13px;
  }

  .cs-table th {
    text-align: left;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 0.75rem 1rem;
    border-bottom: 1px solid var(--border-hover);
  }

  .cs-table td {
    padding: 0.9rem 1rem;
    border-bottom: 1px solid var(--border);
    color: var(--text-secondary);
    vertical-align: top;
    line-height: 1.55;
  }

  .cs-table tr:last-child td { border-bottom: none; }

  .cs-table td:first-child {
    color: var(--text-primary);
    font-weight: 500;
    white-space: nowrap;
  }

  /* DIVIDER */
  .divider { height: 1px; background: var(--border); margin: 2rem 0; }

  /* FINDING */
  .finding {
    display: grid;
    grid-template-columns: 28px 1fr;
    gap: 1rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1.25rem;
    margin-bottom: 12px;
  }

  .finding-icon { font-size: 16px; margin-top: 1px; }

  .finding-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
    margin-bottom: 0.3rem;
  }

  .finding-desc {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.55;
  }

  /* CTA */
  .project-cta {
    padding: 5rem 3rem;
    text-align: center;
    border-top: 1px solid var(--border);
  }

  .cta-label {
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 1.25rem;
  }

  .cta-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(26px, 3.5vw, 44px);
    font-weight: 700;
    letter-spacing: -0.04em;
    margin-bottom: 2rem;
  }

  .cta-btns {
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn-primary {
    display: inline-block;
    font-size: 13px;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
    color: var(--bg);
    background: var(--accent);
    padding: 12px 28px;
    border-radius: 4px;
    text-decoration: none;
    transition: opacity 0.2s;
  }

  .btn-primary:hover { opacity: 0.85; }

  .btn-secondary {
    display: inline-block;
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    color: var(--text-secondary);
    background: transparent;
    border: 1px solid var(--border-hover);
    padding: 12px 28px;
    border-radius: 4px;
    text-decoration: none;
    transition: all 0.2s;
  }

  .btn-secondary:hover { border-color: var(--text-muted); color: var(--text-primary); }

  /* FOOTER */
  .project-footer {
    padding: 2.5rem 3rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
    border-top: 1px solid var(--border);
  }

  .footer-left { font-size: 13px; color: var(--text-muted); }

  .footer-links { display: flex; gap: 2rem; }

  .footer-links a {
    font-size: 13px;
    color: var(--text-secondary);
    text-decoration: none;
    transition: color 0.2s;
  }

  .footer-links a:hover { color: var(--accent); }

  /* 404 */
  .not-found {
    min-height: 80vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 1.5rem;
  }

  @media (max-width: 900px) {
    nav { padding: 0 1.5rem; }
    .project-hero, .content { padding-left: 1.5rem; padding-right: 1.5rem; }
    .meta-grid { grid-template-columns: 1fr 1fr; }
    .cards-grid { grid-template-columns: 1fr; }
    .project-cta { padding: 4rem 1.5rem; }
    .project-footer { padding: 2rem 1.5rem; }
  }
</style>
</head>

          <div class="cards-grid">

          </div>
          <p class="body-text">El análisis se completó con revisión de heatmaps de scroll y clics, grabaciones de sesión y análisis de los puntos de abandono del formulario.</p>

          <div class="finding">

// --- RENDER ---
function getParam(name) {
  return new URLSearchParams(window.location.search).get(name);
}

const GRADIENTS = {
  uxui: 'linear-gradient(135deg, #111 0%, #1a1a2e 100%)',
  cro: 'linear-gradient(135deg, #111 0%, #1a2e1a 100%)',
  brand: 'linear-gradient(135deg, #111 0%, #2e1a1a 100%)',
  data: 'linear-gradient(135deg, #111 0%, #1e1a2e 100%)',
};

function render(id) {
  const p = PROJECTS[id];
  const container = document.getElementById('project-content');

  if (!p) {
    container.innerHTML = `
      <div class="not-found" style="padding-top:64px;">
        <p style="font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:var(--text-muted);">Error 404</p>
        <h1 style="font-family:'Space Grotesk',sans-serif;font-size:40px;font-weight:700;letter-spacing:-0.04em;">Proyecto no encontrado</h1>
        <a href="portfolio-marcos.html" class="btn-primary" style="margin-top:1rem;">← Volver al portfolio</a>
      </div>`;
    return;
  }

  document.title = `${p.title.replace('\n', ' ')} · Marcos Ruiz`;

  const titleLines = p.title.split('\n').map((l, i) =>
    i === 0 ? l : `<span>${l}</span>`
  ).join('<br>');

  const metaHTML = p.meta.map(m => `
    <div class="meta-block">
      <p class="meta-label">${m.label}</p>
      <p class="meta-value">${m.value}</p>
    </div>`).join('');

  const chipsHTML = p.chips.map(c =>
    `<span class="chip">${c}</span>`
  ).join('');

  const sectionsHTML = p.sections.map((s, i) => `
    <section class="section">
      <p class="section-label">${s.label}</p>
      <h2 class="section-title">${s.title}</h2>
      ${s.content}
    </section>`).join('');

  container.innerHTML = `
    <section class="project-hero">
      <div class="hero-grid-bg"></div>
      <div class="hero-inner">
        <div class="hero-chips">
          <span class="chip accent">${p.category} · ${p.year}</span>
          ${chipsHTML}
        </div>
        <h1 class="project-title">${titleLines}</h1>
        <p class="project-subtitle">${p.subtitle}</p>
        <div class="meta-grid">${metaHTML}</div>
        <div class="hero-visual" style="background:${GRADIENTS[p.gradientClass] || GRADIENTS.uxui}">
          <div class="hero-visual-grid"></div>
          <span class="hero-visual-icon">${p.icon}</span>
        </div>
      </div>
    </section>

    <div class="content">
      ${sectionsHTML}
    </div>

    <div class="project-cta">
      <p class="cta-label">¿Seguimos?</p>
      <h2 class="cta-title">Más proyectos<span style="color:var(--accent);">.</span></h2>
      <div class="cta-btns">
        <a href="portfolio-marcos.html" class="btn-primary">← Ver todo el portfolio</a>
        <a href="mailto:hola@marcosruiz.es" class="btn-secondary">hola@marcosruiz.es</a>
      </div>
    </div>
  `;

  document.getElementById('footer-year').textContent =
    `© 2025 Marcos Ruiz Ibáñez — ${p.title.replace('\n', ' ')}`;
}

render(getParam('id'));
</script>
